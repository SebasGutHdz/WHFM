seed: 0
device: auto
dtype: float32

data:
  batch_size: 256
  num_workers: 0
  shuffle: true
  drop_last: true
  total_samples: 4096
  test_fraction: 0.2
  n_dataset: 2048

model:
  width: 512
  hidden: 4
  fourier_modes: 20

initial_fit:
  coupling: ot
  epochs: 150
  steps_per_batch: 1
  noise_std: 1.0e-4

rectification:
  num_rectifications: 10
  direction_order: [forward]
  coupling_generation: own_ema
  steps_per_batch: 64
  ema_target_refresh: per_batch

node_solver:
  method: euler
  node_steps: 1000

bridge_solver:
  kind: scipy
  # sigma: 1.0e-3
  # For asymmetric bridge std boundaries, replace sigma with:
  sigma_source: 1.0e-3
  sigma_target: 1.0e-3
  bridge_steps: 30
  tol: 1.0e-2
  max_nodes: 200
  quadrature_order: 3
  use_monte_carlo: true
  monte_carlo_samples: 20 # Recommend at least 10
  entropy_density_std_floor: 1.0
  n_density_samples: 64
  num_workers: 32
  failure_policy: skip_pair  #skip_pair, raise

optimization:
  learning_rate: 5.0e-4
  weight_decay: 0.0
  scheduler:
    kind: cosine
    min_lr: 0.0

ema:
  mode: fixed
  decay: 0.999
  gamma: 6.99

output:
  root: results
  run_name: null
  checkpoint_every_direction_pass: true
  save_figures: true
  diagnostic_plot_count: 24
