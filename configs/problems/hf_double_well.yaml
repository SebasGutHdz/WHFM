name: hf_double_well
dimension: 1

boundaries:
  source:
    kind: dataset
    name: diagonal_gaussian
    parameters:
      mean: [0.0]
      std: 0.5
    sample_noise: 0.0
  target:
    kind: dataset
    name: gaussian_mixture
    parameters:
      means:
        - [-4.0]
        - [4.0]
      weights: [0.5, 0.5]
      std: 0.3
    sample_noise: 0.0

functional:
  linear:
    name: double_well
    coefficient: 1.0
    parameters:
      alpha: 0.15
      beta: -3.0
  internal: null
  interaction: null
evaluation:
  num_samples: 3000
  max_metric_samples: 512
  num_sliced_projections: 128
  mmd_bandwidth: null
  plot_trajectory_count: 512
  plot_dir1: 0
  plot_dir2: 0
  plot_xlim: [0.0, 0.0]
  plot_ylim: [0.0, 0.0]
  xaxis_hist: 0.4
